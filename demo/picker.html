<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PickyPalette</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/Iosevka/6.0.0/iosevka/iosevka.min.css"
    />
    <link rel="stylesheet" href="./picker.css" />
  </head>
  <body>
    <div class="picker">
      <div class="picker__header">
        <span class="picker__title">PickyPalette</span>
        <label class="picker__settings-toggle">
          <span>Settings</span>
          <input type="checkbox" data-settings-toggle />
        </label>
      </div>
      <div class="picker__settings-body" data-tools hidden></div>
      <div class="picker__canvas-wrap" data-canvas-wrap>
        <!-- canvases inserted by JS -->
      </div>
      <div class="picker__slider" data-slider-wrap></div>
      <button class="picker__add" data-add>Add color <kbd>C</kbd></button>
      <div class="picker__swatches" data-swatches></div>

      <div class="picker__bottom">
        <textarea
          class="picker__paste"
          data-paste
          placeholder="Paste hex colors (comma or space separated)…"
        ></textarea>

        <div class="picker__beam">
        <span class="beam__label">&#x22B7; Token Beam</span>
        <select class="beam__mode" data-beam-mode>
          <option value="send" selected>Send</option>
          <option value="receive">Receive</option>
        </select>
        <input
          class="beam__token"
          data-beam-token
          type="text"
          placeholder="Token (auto-generated)…"
          spellcheck="false"
          autocomplete="off"
        />
        <button class="beam__connect" data-beam-connect>Connect</button>
        <button class="beam__copy" data-beam-copy title="Copy token">Copy</button>
        <span class="beam__status" data-beam-status></span>
        </div>
      </div>
    </div>
    <script type="module" src="./picker.js"></script>
  </body>
</html>
