<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>palette-shader demo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Iosevka/6.0.0/iosevka/iosevka.min.css">
  </head>
  <body>
    <!--h1>Palette Viz</h1-->
    <div class="app">
      <div class="sidebar">
        <textarea class="palette-paste" data-palette-paste placeholder="Paste hex colors (comma or space separated)…"></textarea>
        <div class="sidebar__palette palette" data-palette></div>
        <div class="sidebar__tools" data-tools></div>
      </div>
      <div id="app" class="viz" data-viz></div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
